[package]
name = "cachebox"
version = "0.1.0"
edition = "2024"
description = "A cache-native server for modern self-hosted applications."
license = "MIT OR Apache-2.0"
repository = "https://github.com/smarzola/cachebox"

[dependencies]
axum = { version = "0.8.9", features = ["http2", "json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread", "net", "signal"] }

[dev-dependencies]
http-body-util = "0.1.3"
tower = { version = "0.5.3", features = ["util"] }
