name: Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach assets to
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  BIN_NAME: cachebox
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  linux-binaries:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary
        run: cross build --locked --release --target "${{ matrix.target }}" --bin "${BIN_NAME}"

      - name: Package binary
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="${BIN_NAME}-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${archive}" "${BIN_NAME}"
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*

  macos-binary:
    name: macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --locked --release --target aarch64-apple-darwin --bin "${BIN_NAME}"

      - name: Package binary
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="${BIN_NAME}-${RELEASE_TAG}-aarch64-apple-darwin.tar.gz"
          tar -C "target/aarch64-apple-darwin/release" -czf "dist/${archive}" "${BIN_NAME}"
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*

  docker:
    name: Multi-arch container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
