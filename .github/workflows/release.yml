name: Release

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      mode:
        description: Prepare a release PR or publish the current release PR merge
        required: true
        default: prepare
        type: choice
        options:
          - prepare
          - publish

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Open or update release PR
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'prepare') ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.merged == true &&
       !startsWith(github.event.pull_request.head.ref, 'release/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Prepare release metadata
        run: python3 scripts/release.py prepare

      - name: Stop when no release is needed
        id: release-info
        run: |
          set -euo pipefail
          source release-info.env
          {
            echo "release_needed=${release_needed}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Cache cargo
        if: steps.release-info.outputs.release_needed == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Refresh lockfile
        if: steps.release-info.outputs.release_needed == 'true'
        run: cargo check --workspace

      - name: Create or update release PR
        if: steps.release-info.outputs.release_needed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release-info.outputs.version }}
        run: |
          set -euo pipefail
          branch="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${branch}"
          git add CHANGELOG.md Cargo.lock Cargo.toml crates/cachebox-protocol/Cargo.toml clients/rust/cachebox-client/Cargo.toml clients/python/pyproject.toml clients/python/python/cachebox/__init__.py clients/python/tests/test_package.py
          git commit -m "chore: release v${VERSION}" || exit 0
          git push --force-with-lease origin "${branch}"
          if gh pr view "${branch}" --json number --jq .number >/tmp/release-pr-number 2>/dev/null; then
            pr_number="$(cat /tmp/release-pr-number)"
            gh pr edit "${pr_number}" \
              --title "chore: release v${VERSION}" \
              --body "Automated release PR for v${VERSION}."
          else
            gh pr create \
              --base main \
              --head "${branch}" \
              --title "chore: release v${VERSION}" \
              --body "Automated release PR for v${VERSION}."
          fi

  publish:
    name: Publish release
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'publish') ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/v'))
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Publish GitHub Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="$(python3 scripts/release.py current-version)"
          tag="v${version}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          python3 scripts/release.py notes --version "${version}" > release-notes.md
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "cachebox ${tag}" --notes-file release-notes.md --latest
          else
            gh release create "${tag}" --target main --title "cachebox ${tag}" --notes-file release-notes.md --latest
          fi

  assets:
    name: Build and upload release assets
    needs: publish
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/release-assets.yml
    with:
      tag: ${{ needs.publish.outputs.tag }}
    secrets: inherit
